  </defs>
  <rect width="32" height="32" rx="6" fill="#292929"/>
  <!-- left border: SVG yellow, clipped to rounded shape -->
  <rect x="0" y="0" width="3" height="32" fill="#FFB13B" clip-path="url(#bounds)"/>
